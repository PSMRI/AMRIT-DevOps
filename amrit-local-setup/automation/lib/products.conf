# AMRIT product manifest — maps each product to its required APIs and UIs.
# Sourced by lib/common.sh. Do not run directly.
#
# Adding a new product: extend the three arrays below. The engine handles
# the rest (dependency union, tmux layout, port checks, launch).
#
# Dependency sources (derived from *_example.properties in each product API):
#   ECD     → RedisConfig, common endpoints                     → Common + Identity + ECD
#   HWC     → hwc_example.properties: common/scheduler/inventory/mmu URLs
#   MMU     → scheduler + identity URLs in common_example.properties
#   TM      → scheduler + identity URLs
#   HL104   → common endpoints only
#   HL1097  → fhir + beneficiary + ecd KM + identity + common
#   FLW     → common_example.properties: tm-url + fhir-url            → Common + Identity + BeneficiaryID + FLW + TM + Scheduler + FHIR

declare -A PRODUCT_APIS=(
  [admin]="Common-API Identity-API BeneficiaryID-Generation-API Admin-API"
  [ecd]="Common-API Identity-API BeneficiaryID-Generation-API ECD-API"
  [hwc]="Common-API Identity-API BeneficiaryID-Generation-API HWC-API Scheduler-API Inventory-API TM-API FHIR-API"
  [mmu]="Common-API Identity-API BeneficiaryID-Generation-API MMU-API Scheduler-API TM-API"
  [tm]="Common-API Identity-API BeneficiaryID-Generation-API TM-API Scheduler-API"
  [hl104]="Common-API Identity-API BeneficiaryID-Generation-API Helpline104-API"
  [hl1097]="Common-API Identity-API BeneficiaryID-Generation-API Helpline1097-API"
  [flw]="Common-API Identity-API BeneficiaryID-Generation-API FLW-API TM-API Scheduler-API FHIR-API"
)

declare -A PRODUCT_UIS=(
  [admin]="Admin-UI"
  [ecd]="ECD-UI"
  [hwc]="HWC-UI HWC-Scheduler-UI HWC-Inventory-UI"
  [mmu]="MMU-UI Inventory-UI"
  [tm]="TM-UI"
  [hl104]="Helpline104-UI"
  [hl1097]="Helpline1097-UI"
  [flw]=""
)

declare -A PRODUCT_DESC=(
  [admin]="Admin console (user/role/master-data management — pair with any product)"
  [ecd]="Early Childhood Development"
  [hwc]="Health & Wellness Centers"
  [mmu]="Mobile Medical Unit"
  [tm]="Telemedicine"
  [hl104]="Helpline 104"
  [hl1097]="Helpline 1097"
  [flw]="Front Line Workers"
)

# Canonical iteration order for menus. Admin first so newcomers see it.
PRODUCT_ORDER=(admin ecd hwc mmu tm hl104 hl1097 flw)
