# AMRIT service registry — per-API and per-UI metadata.
# Sourced by lib/common.sh. Do not run directly.
#
# Adding a new API: extend API_REPO, API_PORT, API_PROPS.
# Adding a new UI:  extend UI_REPO, UI_PORT, UI_ENV.
# Property-file naming convention comes from each repo's pom.xml
# (<source-properties>…${environment}.properties</source-properties>).

# ── APIs ──────────────────────────────────────────────────────────────────────

declare -A API_REPO=(
  [Common-API]="https://github.com/PSMRI/Common-API.git"
  [Identity-API]="https://github.com/PSMRI/Identity-API.git"
  [Admin-API]="https://github.com/PSMRI/Admin-API.git"
  [ECD-API]="https://github.com/PSMRI/ECD-API.git"
  [HWC-API]="https://github.com/PSMRI/HWC-API.git"
  [Inventory-API]="https://github.com/PSMRI/Inventory-API.git"
  [MMU-API]="https://github.com/PSMRI/MMU-API.git"
  [Scheduler-API]="https://github.com/PSMRI/Scheduler-API.git"
  [TM-API]="https://github.com/PSMRI/TM-API.git"
  [Helpline1097-API]="https://github.com/PSMRI/Helpline1097-API.git"
  [Helpline104-API]="https://github.com/PSMRI/Helpline104-API.git"
  [BeneficiaryID-Generation-API]="https://github.com/PSMRI/BeneficiaryID-Generation-API.git"
  [FHIR-API]="https://github.com/PSMRI/FHIR-API.git"
  [FLW-API]="https://github.com/PSMRI/FLW-API.git"
)

declare -A API_PORT=(
  [FLW-API]=8081
  [Admin-API]=8082
  [Common-API]=8083
  [ECD-API]=8084
  [HWC-API]=8085
  [Inventory-API]=8086
  [MMU-API]=8087
  [Scheduler-API]=8088
  [TM-API]=8089
  [Helpline1097-API]=8090
  [Helpline104-API]=8091
  [BeneficiaryID-Generation-API]=8092
  [FHIR-API]=8093
  [Identity-API]=8094
)

# Format: <example_file>:<local_file> relative to repo root.
# Naming is driven by each API's pom.xml <source-properties> tag.
declare -A API_PROPS=(
  [Common-API]="src/main/environment/common_example.properties:src/main/environment/common_local.properties"
  [Identity-API]="src/main/environment/common_example.properties:src/main/environment/common_local.properties"
  [Admin-API]="src/main/environment/admin_example.properties:src/main/environment/admin_local.properties"
  [ECD-API]="src/main/environment/ecd_example.properties:src/main/environment/ecd_local.properties"
  [HWC-API]="src/main/environment/common_example.properties:src/main/environment/common_local.properties"
  [Inventory-API]="src/main/environment/common_example.properties:src/main/environment/common_local.properties"
  [MMU-API]="src/main/environment/common_example.properties:src/main/environment/common_local.properties"
  [Scheduler-API]="src/main/environment/common_example.properties:src/main/environment/common_local.properties"
  [TM-API]="src/main/environment/common_example.properties:src/main/environment/common_local.properties"
  [Helpline1097-API]="src/main/environment/common_example.properties:src/main/environment/common_local.properties"
  [Helpline104-API]="src/main/environment/104_example.properties:src/main/environment/104_local.properties"
  [BeneficiaryID-Generation-API]="src/main/environment/bengen_example.properties:src/main/environment/bengen_local.properties"
  [FHIR-API]="src/main/environment/common_example.properties:src/main/environment/common_local.properties"
  [FLW-API]="src/main/environment/common_example.properties:src/main/environment/common_local.properties"
)

# ── UIs ───────────────────────────────────────────────────────────────────────

declare -A UI_REPO=(
  [Admin-UI]="https://github.com/PSMRI/ADMIN-UI.git"
  [ECD-UI]="https://github.com/PSMRI/ECD-UI.git"
  [HWC-UI]="https://github.com/PSMRI/HWC-UI.git"
  [HWC-Scheduler-UI]="https://github.com/PSMRI/HWC-Scheduler-UI.git"
  [HWC-Inventory-UI]="https://github.com/PSMRI/HWC-Inventory-UI.git"
  [Inventory-UI]="https://github.com/PSMRI/Inventory-UI.git"
  [MMU-UI]="https://github.com/PSMRI/MMU-UI.git"
  [Scheduler-UI]="https://github.com/PSMRI/Scheduler-UI.git"
  [TM-UI]="https://github.com/PSMRI/TM-UI.git"
  [Helpline104-UI]="https://github.com/PSMRI/Helpline104-UI.git"
  [Helpline1097-UI]="https://github.com/PSMRI/Helpline1097-UI.git"
)

# Ports from each UI's angular.json; Helpline* don't set one — we assign
# explicit ports on launch to avoid collisions with default 4200.
declare -A UI_PORT=(
  [Inventory-UI]=4201
  [MMU-UI]=4202
  [TM-UI]=4203
  [HWC-UI]=4204
  [Admin-UI]=4205
  [HWC-Scheduler-UI]=4206
  [HWC-Inventory-UI]=4207
  [Scheduler-UI]=4208
  [ECD-UI]=4209
  [Helpline104-UI]=4210
  [Helpline1097-UI]=4211
)

# Format: <example_env>:<local_env> relative to repo root.
# Convention: all UIs copy environment.local.ts → environment.ts.
declare -A UI_ENV=(
  [Admin-UI]="src/environments/environment.local.ts:src/environments/environment.ts"
  [ECD-UI]="src/environments/environment.local.ts:src/environments/environment.ts"
  [HWC-UI]="src/environments/environment.local.ts:src/environments/environment.ts"
  [HWC-Scheduler-UI]="src/environments/environment.local.ts:src/environments/environment.ts"
  [HWC-Inventory-UI]="src/environments/environment.local.ts:src/environments/environment.ts"
  [Inventory-UI]="src/environments/environment.local.ts:src/environments/environment.ts"
  [MMU-UI]="src/environments/environment.local.ts:src/environments/environment.ts"
  [Scheduler-UI]="src/environments/environment.local.ts:src/environments/environment.ts"
  [TM-UI]="src/environments/environment.local.ts:src/environments/environment.ts"
  [Helpline104-UI]="src/environments/environment.local.ts:src/environments/environment.ts"
  [Helpline1097-UI]="src/environments/environment.local.ts:src/environments/environment.ts"
)
